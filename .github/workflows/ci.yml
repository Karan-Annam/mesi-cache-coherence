name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Verilator
        run: sudo apt-get update && sudo apt-get install -y verilator
      - name: C++ tests
        run: make model-tests
      - name: Measurement driver
        run: make model
      - name: RTL lint
        run: make lint
      - name: RTL simulation
        run: make sim
